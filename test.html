<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DD1_JR | Cyber Operations v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* [1] الماوس الجديد (أضفت هذا فقط) */
        * { cursor: none !important; }
        #cursor-dot {
            position: fixed; width: 8px; height: 8px; background: var(--neon-blue);
            border-radius: 50%; pointer-events: none; z-index: 10001; transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--neon-blue);
        }
        #cursor-outline {
            position: fixed; width: 35px; height: 35px; border: 2px solid var(--neon-purple);
            border-radius: 50%; pointer-events: none; z-index: 10000;
            transition: 0.1s ease-out; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px var(--neon-purple);
        }

        :root {
            --neon-purple: #bc13fe; --neon-blue: #00d2ff; --bg-dark: #020202; --card-bg: rgba(8, 8, 8, 0.92);
            --disabled: #555;
        }

        body {
            background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; overflow-x: hidden; height: 100vh; overflow-y: auto; scroll-behavior: smooth;
        }

        #matrix-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.35; filter: blur(0.5px); }

        /* [2] الإعدادات (نفس كودك مع إضافة الـ Slider وتعديل الـ Off) */
        .ui-controls { position: fixed; top: 20px; left: 25px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .ui-controls button {
            background: rgba(0, 0, 0, 0.9); border: 1px solid var(--neon-purple);
            color: var(--neon-purple); padding: 10px 20px; border-radius: 6px;
            cursor: pointer; font-family: 'Share Tech Mono', monospace; font-size: 0.85rem;
            transition: 0.4s; display: flex; align-items: center; gap: 8px; letter-spacing: 1px;
        }
        /* تأثير التعطيل */
        .ui-controls button.is-off {
            border-color: var(--disabled) !important; color: var(--disabled) !important;
            box-shadow: none !important;
        }

        /* شريط الوضوح */
        .matrix-config { background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #222; border-radius: 6px; }
        .matrix-config label { font-size: 0.6rem; color: var(--neon-blue); display: block; margin-bottom: 5px; font-family: monospace; }
        #opacity-slider { width: 100%; cursor: pointer; accent-color: var(--neon-blue); }

        #system-logs {
            position: fixed; bottom: 25px; right: 25px; width: 300px; height: 180px;
            background: rgba(0, 0, 0, 0.95); border-left: 4px solid var(--neon-blue);
            border-radius: 4px; font-family: 'Consolas', monospace; font-size: 0.75rem;
            padding: 15px; overflow-y: hidden; color: var(--neon-blue);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); z-index: 100;
        }

        section { padding: 80px 25px; display: flex; flex-direction: column; align-items: center; position: relative; }
        
        .logo-container { margin-bottom: 10px; z-index: 10; animation: float 4s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .neon-logo { width: 100px; height: 100px; filter: drop-shadow(0 0 15px var(--neon-purple)); }

        .neon-title {
            font-size: clamp(3.5rem, 12vw, 6rem); font-weight: 900;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple), var(--neon-blue));
            background-size: 200% auto; -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; margin: 10px 0;
            filter: drop-shadow(0 0 20px rgba(188, 19, 254, 0.6));
            text-transform: uppercase; animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .identity-wrapper {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px; width: 100%; max-width: 1100px; margin-top: 50px; perspective: 1000px;
        }

        .terminal-box {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05);
            padding: 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            backdrop-filter: blur(10px); transition: 0.5s;
        }
        .terminal-box:hover { transform: translateY(-10px); border-color: var(--neon-purple); }

        .terminal-header { color: var(--neon-blue); font-family: monospace; font-size: 0.9rem; margin-bottom: 20px; border-bottom: 1px solid rgba(0,210,255,0.2); padding-bottom: 8px; display: flex; justify-content: space-between; }
        .bio-line { margin: 12px 0; font-size: 1.05rem; line-height: 1.6; text-align: left; }
        .bio-key { color: var(--neon-purple); font-weight: bold; font-family: 'JetBrains Mono', monospace; }

        .social-bar { display: flex; gap: 25px; margin: 30px 0; }
        .social-bar a { color: #666; font-size: 1.8rem; transition: 0.4s; }
        .social-bar a:hover { color: var(--neon-blue); transform: translateY(-5px); }

        #intro-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .intro-logo-text { font-size: 5rem; font-weight: 900; color: white; text-shadow: 0 0 30px #bc13fe; font-family: monospace; letter-spacing: 15px; }
        .load-track { width: 300px; height: 3px; background: rgba(255,255,255,0.1); margin-top: 35px; }
        #bar { width: 0%; height: 100%; background: var(--neon-purple); }

    </style>
</head>
<body>

    <div id="cursor-dot"></div>
    <div id="cursor-outline"></div>

    <div id="intro-overlay">
        <div class="intro-logo-text">DD1_JR</div>
        <div class="load-track"><div id="bar"></div></div>
    </div>

    <canvas id="matrix-canvas"></canvas>

    <div class="ui-controls">
        <button onclick="toggleMatrix()" id="matrixBtn"><i class="fas fa-code"></i> MATRIX_STREAM: ON</button>
        <div class="matrix-config">
            <label>MATRIX_OPACITY</label>
            <input type="range" id="opacity-slider" min="0" max="1" step="0.01" value="0.35" oninput="adjustMatrix(this.value)">
        </div>
        <button onclick="toggleLogs()" id="logsBtn"><i class="fas fa-terminal"></i> OS_LOGS: ON</button>
    </div>

    <div id="system-logs"></div>

    <section id="hero">
        <div class="logo-container">
            <svg viewBox="0 0 100 100" class="neon-logo">
                <circle cx="50" cy="50" r="45" stroke="#bc13fe" stroke-width="3" fill="none" />
                <text x="50%" y="50%" text-anchor="middle" fill="white" font-size="45" dy=".35em">D</text>
            </svg>
        </div>

        <h1 class="neon-title">DD1_JR</h1>
        
        <div class="social-bar">
            <a href="https://github.com/DanneKZ"><i class="fab fa-github"></i></a>
            <a href="https://discord.com/users/1336353146020298816"><i class="fab fa-discord"></i></a>
            <a href="#"><i class="fas fa-shield-alt"></i></a>
        </div>

        <div class="identity-wrapper">
            <div class="terminal-box">
                <div class="terminal-header">CORE_IDENT_MODULE</div>
                <div class="bio-line"><span class="bio-key">> USERNAME:</span> Daniel (DD1_JR)</div>
                <div class="bio-line"><span class="bio-key">> LEVEL:</span> 15 Cycles (Years)</div>
                <div class="bio-line"><span class="bio-key">> LEGACY:</span> Iraqi Roots 🇮🇶</div>
            </div>
            <div class="terminal-box" style="border: 1px solid var(--neon-blue);">
                <div class="terminal-header" style="color: var(--neon-purple);">TECH_STACK_OVERRIDE</div>
                <div class="bio-line"><span class="bio-key">> ENGINE:</span> LUA (MTA / FiveM)</div>
                <div class="bio-line"><span class="bio-key">> INTERFACE:</span> HTML5 / CSS3 / JS</div>
                <div class="bio-line"><span class="bio-key">> STATUS:</span> ACTIVE_DEV</div>
            </div>
        </div>
    </section>

    <script>
        // [1] تحريك الماوس
        const dot = document.getElementById('cursor-dot');
        const out = document.getElementById('cursor-outline');
        document.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px';
            setTimeout(() => {
                out.style.left = e.clientX + 'px'; out.style.top = e.clientY + 'px';
            }, 50);
        });

        // [2] التحكم في الماتريكس (الوضوح والأزرار)
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        let matrixOn = true;

        function adjustMatrix(val) { canvas.style.opacity = val; }

        function toggleMatrix() {
            matrixOn = !matrixOn;
            const btn = document.getElementById('matrixBtn');
            if(matrixOn) {
                canvas.style.display = "block";
                btn.classList.remove('is-off');
                btn.innerHTML = '<i class="fas fa-code"></i> MATRIX_STREAM: ON';
            } else {
                canvas.style.display = "none";
                btn.classList.add('is-off');
                btn.innerHTML = '<i class="fas fa-code"></i> MATRIX_STREAM: OFF';
            }
        }

        // [3] كود الماتريكس الأصلي
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const fontSize = 16;
        const drops = Array(Math.floor(canvas.width/fontSize)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#bc13fe"; ctx.font = fontSize + "px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(letters[Math.floor(Math.random()*letters.length)], i*fontSize, y*fontSize);
                if (y*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);

        // [4] التحكم في اللوجات
        let logsOn = true;
        function toggleLogs() {
            logsOn = !logsOn;
            const btn = document.getElementById('logsBtn');
            const box = document.getElementById('system-logs');
            if(logsOn) {
                box.style.display = "block";
                btn.classList.remove('is-off');
                btn.innerHTML = '<i class="fas fa-terminal"></i> OS_LOGS: ON';
            } else {
                box.style.display = "none";
                btn.classList.add('is-off');
                btn.innerHTML = '<i class="fas fa-terminal"></i> OS_LOGS: OFF';
            }
        }

        // [5] شاشة التحميل
        let prg = 0;
        const b = document.getElementById('bar');
        const load = setInterval(() => {
            prg += 5; b.style.width = prg + "%";
            if (prg >= 100) {
                clearInterval(load);
                document.getElementById('intro-overlay').style.display = "none";
            }
        }, 100);
    </script>
</body>
</html>
