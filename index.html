<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DD1_JR | THE MASTERFRAME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300;500&display=swap');

        :root {
            --neon: #bc13fe;
            --cyan: #00d2ff;
            --dark: #020202;
            --glass: rgba(15, 15, 15, 0.8);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--dark);
            color: white;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
        }

        /* [1] MATRIX INTRO LAYER */
        #intro-wrapper {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s ease, transform 1.5s ease;
        }

        #intro-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .terminal-box {
            position: relative;
            z-index: 10001;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--neon);
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 50px var(--neon);
            pointer-events: none;
            opacity: 0;
            animation: fadeIn 1s forwards 1s;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .loading-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 5px;
            color: var(--cyan);
            text-shadow: 0 0 10px var(--cyan);
        }

        /* [2] MAIN CONTENT (Hidden initially) */
        #main-site {
            opacity: 0;
            transform: scale(1.1);
            transition: opacity 2s ease, transform 2s ease;
            height: 100vh;
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Designing the Master Dashboard */
        .sidebar {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(188, 19, 254, 0.3);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-radius: 10px;
        }

        .glitch-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            color: white;
            text-shadow: 2px 2px var(--neon), -2px -2px var(--cyan);
            text-align: center;
        }

        .operation-card {
            background: rgba(255,255,255,0.05);
            border-left: 4px solid var(--neon);
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
        }

        .status-online { color: #0f0; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        .btn-action {
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 10px;
            cursor: pointer;
            font-family: 'Orbitron';
            width: 100%;
            margin-top: 10px;
        }

        .btn-action:hover { background: var(--cyan); color: black; }

        #logs-stream {
            font-size: 0.7rem;
            color: var(--cyan);
            height: 200px;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
        }
    </style>
</head>
<body>

    <div id="intro-wrapper">
        <canvas id="intro-canvas"></canvas>
        <div class="terminal-box">
            <div class="loading-text">SYSTEM BREACH</div>
            <div style="color: white; margin-top: 10px; font-size: 0.8rem;">DANIEL IDENTITY VERIFIED...</div>
        </div>
    </div>

    <div id="main-site">
        <div class="sidebar">
            <div class="glitch-title">DD1_JR</div>
            <div style="text-align: center; margin: 20px 0;">
                <div style="font-size: 0.7rem; color: var(--neon);">[ROOT_USER]</div>
                <div style="font-size: 1.2rem;">DANIEL TANK</div>
            </div>
            <div class="operation-card">
                <div style="font-size: 0.8rem; color: var(--neon);">SYSTEM STATUS</div>
                <div style="margin-top: 5px;">ONLINE <span class="status-online">●</span></div>
            </div>
            <div id="logs-stream"></div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 20px;">
            <div class="sidebar" style="flex: 1;">
                <h3 style="font-family: 'Orbitron'; color: var(--cyan); border-bottom: 1px solid #333; padding-bottom: 10px;">ACTIVE OPERATIONS</h3>
                <div id="ops-container">
                    </div>
            </div>
            <div class="sidebar" style="height: 150px; flex-direction: row; align-items: center; justify-content: space-between;">
                <div>
                    <h4 style="margin: 0; color: var(--neon);">SHIELD_PROTOCOL</h4>
                    <p style="font-size: 0.8rem; color: #777;">Purging malicious links in real-time.</p>
                </div>
                <button class="btn-action" style="width: 120px;" onclick="window.open('https://top.gg/bot/1488965929810526308')">DEPLOY</button>
            </div>
        </div>

        <div class="sidebar">
            <h4 style="font-family: 'Orbitron'; text-align: center; color: var(--cyan);">NETWORK_STATS</h4>
            <div class="operation-card" style="text-align: center; border-left: none; border-bottom: 3px solid var(--cyan);">
                <div style="font-size: 1.5rem;">99.9%</div>
                <div style="font-size: 0.6rem;">STABILITY</div>
            </div>
            <div class="operation-card" style="text-align: center; border-left: none; border-bottom: 3px solid var(--neon);">
                <div style="font-size: 1.5rem;">2026</div>
                <div style="font-size: 0.6rem;">CURRENT_EPOCH</div>
            </div>
            <div style="margin-top: auto;">
                <button class="btn-action" style="border-color: var(--neon); color: var(--neon);" onclick="window.open('https://github.com/DanneKZ')">SOURCE_CODE</button>
            </div>
        </div>
    </div>

    <script>
        // --- [1] INTRO MATRIX RAIN SCRIPT ---
        const introCanvas = document.getElementById('intro-canvas');
        const ictx = introCanvas.getContext('2d');

        introCanvas.width = window.innerWidth;
        introCanvas.height = window.innerHeight;

        const charSet = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ$#@&*%";
        const chars = charSet.split("");
        const fontSize = 16;
        const columns = introCanvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawIntroMatrix() {
            ictx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ictx.fillRect(0, 0, introCanvas.width, introCanvas.height);
            
            ictx.fillStyle = "#bc13fe"; // Purple rain for DD1_JR
            ictx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ictx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > introCanvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        let introInterval = setInterval(drawIntroMatrix, 35);

        // --- [2] TRANSITION LOGIC ---
        setTimeout(() => {
            const wrapper = document.getElementById('intro-wrapper');
            const mainSite = document.getElementById('main-site');
            
            wrapper.style.opacity = '0';
            wrapper.style.transform = 'scale(1.2)';
            
            setTimeout(() => {
                wrapper.style.display = 'none';
                clearInterval(introInterval);
                mainSite.style.opacity = '1';
                mainSite.style.transform = 'scale(1)';
            }, 1500);
        }, 5000); // 5 Seconds of glorious Matrix rain

        // --- [3] DYNAMIC CONTENT ---
        const ops = [
            { name: "SHIELD_AI", status: "SECURE", progress: "95%" },
            { name: "KNIGHTFALL", status: "RUNNING", progress: "100%" },
            { name: "SHADOW_GATE", status: "ENCRYPTING", progress: "42%" }
        ];

        const opsContainer = document.getElementById('ops-container');
        ops.forEach(op => {
            opsContainer.innerHTML += `
                <div class="operation-card">
                    <div style="display:flex; justify-content:space-between;">
                        <span style="color:var(--cyan)">${op.name}</span>
                        <span style="font-size:0.7rem;">${op.status}</span>
                    </div>
                    <div style="background:#111; height:4px; margin-top:10px;">
                        <div style="width:${op.progress}; background:var(--neon); height:100%;"></div>
                    </div>
                </div>
            `;
        });

        const logs = document.getElementById('logs-stream');
        setInterval(() => {
            const p = document.createElement('div');
            p.innerHTML = `<span style="color:var(--neon)">></span> AUTH_CHECK: PASS [${Math.random().toString(16).substr(2, 6)}]`;
            logs.prepend(p);
            if(logs.children.length > 10) logs.lastChild.remove();
        }, 2500);
    </script>
</body>
</html>
