<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DD1_JR | THE MASTERFRAME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300;500&display=swap');

        :root {
            --neon: #bc13fe;
            --cyan: #00d2ff;
            --dark: #020202;
            --glass: rgba(15, 15, 15, 0.7);
        }

        body {
            background-color: var(--dark);
            color: white;
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            overflow: hidden;
            cursor: crosshair;
        }

        /* [1] ULTRA INTRO SCREEN */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .terminal-loader {
            border: 1px solid var(--neon);
            padding: 30px;
            background: rgba(10, 0, 20, 0.9);
            box-shadow: 0 0 50px rgba(188, 19, 254, 0.2);
            width: 450px;
        }

        .loader-text {
            color: var(--cyan);
            font-size: 0.8rem;
            margin: 5px 0;
            opacity: 0;
            transform: translateX(-10px);
            animation: slideIn 0.3s forwards;
        }

        @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }

        .progress-bar-intro {
            height: 2px;
            width: 0%;
            background: var(--neon);
            margin-top: 20px;
            box-shadow: 0 0 15px var(--neon);
            transition: 0.5s;
        }

        /* [2] BACKGROUND PARTICLES */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0a0015 0%, #000 100%);
        }

        /* [3] MAIN UI */
        .container {
            height: 100vh;
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            padding: 20px;
            gap: 20px;
            box-sizing: border-box;
            opacity: 0;
            transition: 2s;
        }

        /* Sidebars */
        .sidebar {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(188, 19, 254, 0.2);
            border-radius: 5px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glitch-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            text-align: center;
            letter-spacing: 5px;
            color: white;
            text-shadow: 2px 2px var(--neon), -2px -2px var(--cyan);
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 2px var(--neon), -2px -2px var(--cyan); }
            25% { text-shadow: -2px 2px var(--cyan), 2px -2px var(--neon); }
            50% { transform: skew(2deg); }
            100% { transform: skew(0deg); }
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--neon);
            padding: 15px;
            border-radius: 4px;
        }

        .skill-tag {
            display: inline-block;
            padding: 3px 8px;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            font-size: 0.7rem;
            margin: 3px;
            border-radius: 3px;
        }

        /* System Logs */
        #logs-stream {
            flex: 1;
            font-size: 0.65rem;
            color: #555;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
        }

        /* Central Frame */
        .main-frame {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .operation-card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .operation-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            animation: scanLine 3s infinite;
        }

        @keyframes scanLine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .progress-circle {
            width: 50px; height: 50px;
            border: 3px solid var(--neon);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            box-shadow: 0 0 10px var(--neon);
        }

        /* Buttons */
        .btn-cyber {
            background: transparent;
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 10px;
            text-transform: uppercase;
            font-family: 'Orbitron';
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .btn-cyber:hover {
            background: var(--neon);
            color: black;
            box-shadow: 0 0 20px var(--neon);
        }

        .visitor-badge {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 0.7rem;
            color: var(--neon);
            background: rgba(0,0,0,0.8);
            padding: 5px 10px;
            border: 1px solid var(--neon);
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="terminal-loader" id="loader">
            </div>
    </div>

    <div id="particles-js"></div>

    <div class="container" id="main-ui">
        <div class="sidebar">
            <div class="glitch-title">DD1_JR</div>
            <div style="text-align: center;">
                <img src="https://via.placeholder.com/100/bc13fe/ffffff?text=TANK" style="border-radius: 50%; border: 2px solid var(--neon); padding: 5px;">
            </div>
            <div class="stat-card">
                <div style="color: var(--neon); font-size: 0.8rem;">[IDENTITY]</div>
                <div style="margin-top: 10px; font-size: 0.9rem;">DANIEL TANK</div>
                <div style="font-size: 0.7rem; color: #888;">LEVEL: ELITE OPERATOR</div>
            </div>
            <div class="stat-card" style="border-color: var(--cyan);">
                <div style="color: var(--cyan); font-size: 0.8rem;">[SKILLS]</div>
                <div style="margin-top: 10px;">
                    <span class="skill-tag">LUA</span>
                    <span class="skill-tag">C++</span>
                    <span class="skill-tag">JS</span>
                    <span class="skill-tag">REVERSING</span>
                </div>
            </div>
            <div id="logs-stream"></div>
        </div>

        <div class="main-frame">
            <div class="operation-card" style="flex: 1;">
                <h3 style="font-family: 'Orbitron'; color: var(--cyan);">// ACTIVE_PROJECTS</h3>
                <div id="project-list" style="display: grid; gap: 15px; margin-top: 20px;">
                    </div>
            </div>
            
            <div class="operation-card" style="height: 150px; display: flex; align-items: center; justify-content: space-between;">
                <div>
                    <h4 style="margin: 0; color: var(--neon);">SHIELD_PROTOCOL_BOT</h4>
                    <p style="font-size: 0.8rem; color: #888;">Protecting Discord Communities from malicious links.</p>
                </div>
                <button class="btn-cyber" onclick="window.open('https://top.gg/bot/1488965929810526308')">Deploy</button>
            </div>
        </div>

        <div class="sidebar">
            <h4 style="font-family: 'Orbitron'; color: var(--neon); text-align: center;">SYSTEM_STATUS</h4>
            <div class="stat-card" style="text-align: center;">
                <div style="font-size: 2rem; color: var(--cyan);">99.9%</div>
                <div style="font-size: 0.6rem;">UPTIME</div>
            </div>
            <div class="stat-card" style="text-align: center;">
                <div style="font-size: 2rem; color: var(--neon);">1.5k</div>
                <div style="font-size: 0.6rem;">COMMITS</div>
            </div>
            
            <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
                <button class="btn-cyber" onclick="window.open('https://github.com/DanneKZ')">Github</button>
                <button class="btn-cyber" style="border-color: var(--cyan); color: var(--cyan);">Lab Access</button>
            </div>
        </div>
    </div>

    <div class="visitor-badge">
        TRAFFIC_ID: <img src="https://komarev.com/ghpvc/?username=Daniel-DD1JR-Stats&color=bc13fe&style=flat-square" style="vertical-align: middle;">
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // 1. Intro Sequences
        const loader = document.getElementById('loader');
        const introLines = [
            "DECRYPTING DD1_JR PROTOCOLS...",
            "BYPASSING SECURITY LAYERS... [OK]",
            "MOUNTING CYBER_DRIVE... [OK]",
            "INITIALIZING INTERFACE...",
            "WELCOME BACK, MASTER."
        ];

        introLines.forEach((line, i) => {
            setTimeout(() => {
                const p = document.createElement('div');
                p.className = 'loader-text';
                p.innerHTML = `<span style="color:var(--neon)">></span> ${line}`;
                loader.appendChild(p);
            }, i * 600);
        });

        setTimeout(() => {
            document.getElementById('intro-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-overlay').style.display = 'none';
                document.getElementById('main-ui').style.opacity = '1';
                document.body.style.overflow = 'auto';
            }, 1000);
        }, 4000);

        // 2. Particles Background
        particlesJS('particles-js', {
            particles: {
                number: { value: 80 },
                color: { value: '#bc13fe' },
                shape: { type: 'circle' },
                opacity: { value: 0.5 },
                size: { value: 3 },
                line_linked: { enable: true, distance: 150, color: '#00d2ff', opacity: 0.4, width: 1 },
                move: { enable: true, speed: 2 }
            },
            interactivity: {
                events: { onhover: { enable: true, mode: 'grab' } }
            }
        });

        // 3. Dynamic Logs
        const logsBox = document.getElementById('logs-stream');
        setInterval(() => {
            const p = document.createElement('div');
            p.style.marginBottom = "5px";
            p.innerHTML = `<span style="color:var(--cyan)">[${new Date().toLocaleTimeString()}]</span> EVENT_LOG: System stable...`;
            logsBox.prepend(p);
            if(logsBox.children.length > 15) logsBox.lastChild.remove();
        }, 4000);

        // 4. Projects Injection
        const projects = [
            { name: "SHIELD_AI", desc: "Neuro-link security filter.", progress: 95 },
            { name: "SHADOW_GATE", desc: "Invisible proxy tunneling.", progress: 40 },
            { name: "KNIGHTFALL", desc: "MTA advanced server core.", progress: 100 }
        ];

        const list = document.getElementById('project-list');
        projects.forEach(p => {
            list.innerHTML += `
                <div style="display:flex; align-items:center; gap:20px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 5px;">
                    <div class="progress-circle">${p.progress}%</div>
                    <div style="flex:1;">
                        <div style="color:var(--cyan); font-size: 0.9rem;">${p.name}</div>
                        <div style="font-size: 0.7rem; color: #666;">${p.desc}</div>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
