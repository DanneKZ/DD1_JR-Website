<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Projects | Cyber Dashboard</title>
    <style>
        :root {
            --bg-black: #0a0a0a;
            --neon-blue: #00d4ff;
            --neon-purple: #9400d3;
            --text-gray: #b0b0b0;
        }

        body {
            background-color: var(--bg-black);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: rgba(20, 20, 20, 0.9);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
            text-align: center;
        }

        /* تنسيق الشعار الجديد */
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .neon-logo {
            width: 100px;
            height: 100px;
            filter: drop-shadow(0 0 10px var(--neon-purple)) drop-shadow(0 0 5px var(--neon-blue));
            transition: 0.5s;
        }

        .neon-logo:hover {
            transform: scale(1.1) rotate(5deg);
            filter: drop-shadow(0 0 20px var(--neon-blue)) drop-shadow(0 0 10px var(--neon-purple));
        }

        .logo-circle {
            stroke-dasharray: 283;
            animation: rotateCircle 3s linear infinite;
        }

        @keyframes rotateCircle {
            from { stroke-dashoffset: 283; }
            to { stroke-dashoffset: 0; }
        }

        h1 {
            color: var(--neon-blue);
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--neon-blue);
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .project-card {
            background: #1a1a1a;
            margin: 15px 0;
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid var(--neon-purple);
            transition: 0.3s;
            text-align: left;
        }

        .project-card:hover {
            transform: translateX(10px);
            background: #252525;
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .project-name {
            font-weight: bold;
            color: var(--neon-blue);
            font-size: 1.2em;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            box-shadow: 0 0 10px var(--neon-purple);
            width: 0%;
            transition: width 1.5s ease-in-out;
        }

        .status-tag {
            font-size: 0.8em;
            padding: 3px 8px;
            border-radius: 4px;
            background: var(--neon-purple);
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <svg viewBox="0 0 100 100" class="neon-logo">
                <defs>
                    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--neon-blue);stop-opacity:1" />
                        <stop offset="100%" style="stop-color:var(--neon-purple);stop-opacity:1" />
                    </linearGradient>
                </defs>
                <circle cx="50" cy="50" r="45" stroke="url(#grad1)" stroke-width="2" fill="none" class="logo-circle" />
                <text x="50%" y="50%" text-anchor="middle" fill="url(#grad1)" font-family="monospace" font-weight="bold" font-size="40" dy=".3em">D</text>
            </svg>
        </div>

        <h1>DANIEL_PROJECTS</h1>
        <div id="projects-list">
            </div>
    </div>

    <script>
        // جلب البيانات من ملف data.json المرفوع على مستودعك
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('projects-list');
                data.projects.forEach(project => {
                    const card = document.createElement('div');
                    card.className = 'project-card';
                    card.innerHTML = `
                        <div class="project-header">
                            <span class="project-name">${project.name}</span>
                            <span class="status-tag">${project.percent}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${project.percent}%"></div>
                        </div>
                    `;
                    list.appendChild(card);
                });
            })
            .catch(error => console.error('Error loading JSON:', error));
    </script>
</body>
</html>
