<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DD1_JR | MULTI-SYNC INTERFACE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* [1] تعريف الألوان للمودات المختلفة */
        :root[data-theme="dark"] {
            --bg: #050508;
            --card: rgba(15, 15, 20, 0.9);
            --text: #e0e0e0;
            --neon: #bc13fe;
            --accent: #00d2ff;
            --matrix-opacity: 0.4;
            --border: #1a1a1a;
        }

        :root[data-theme="light"] {
            --bg: #f5f5f7;
            --card: rgba(255, 255, 255, 0.9);
            --text: #1d1d1f;
            --neon: #8b00ff;
            --accent: #0071e3;
            --matrix-opacity: 0.1;
            --border: #d2d2d7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.4s, color 0.4s; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            overflow-x: hidden;
            cursor: none; /* سنستخدم ماوس مخصص */
        }

        /* [2] الماوس المخصص (التأثير الذي طلبته) */
        #custom-cursor {
            position: fixed; width: 20px; height: 20px;
            background: var(--neon); border-radius: 50%;
            pointer-events: none; z-index: 9999;
            mix-blend-mode: difference; transition: transform 0.1s ease;
        }
        #cursor-glow {
            position: fixed; width: 400px; height: 400px;
            background: radial-gradient(circle, var(--soft-glow) 0%, transparent 70%);
            pointer-events: none; z-index: 9998; transform: translate(-50%, -50%);
            opacity: 0.5;
        }

        #matrix-canvas {
            position: fixed; top: 0; left: 0; z-index: -1;
            opacity: var(--matrix-opacity);
        }

        /* [3] زر التبديل الأسطوري */
        .theme-toggle {
            position: fixed; top: 25px; right: 25px; z-index: 5000;
            background: var(--card); border: 1px solid var(--border);
            padding: 10px 15px; border-radius: 50px; cursor: pointer;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .theme-toggle i { color: var(--neon); font-size: 1.2rem; }

        /* [4] الهيكلية البصرية */
        section { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 100px 20px; }

        .profile-container {
            width: 100%; max-width: 1000px; text-align: center;
        }

        .hero-title {
            font-family: 'Orbitron', sans-serif; font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900; margin-bottom: 20px;
            background: linear-gradient(45deg, var(--neon), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(188, 19, 254, 0.2));
        }

        .info-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px; margin-top: 50px;
        }

        .glass-card {
            background: var(--card); border: 1px solid var(--border);
            padding: 40px; border-radius: 20px; backdrop-filter: blur(15px);
            position: relative; overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        /* تأثير الـ Hover المطور */
        .glass-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border-color: var(--neon);
        }

        .glass-card::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(188, 19, 254, 0.1) 0%, transparent 70%);
            opacity: 0; transition: 0.5s;
        }
        .glass-card:hover::after { opacity: 1; }

        .stat-line {
            display: flex; justify-content: space-between; margin: 15px 0;
            border-bottom: 1px solid var(--border); padding-bottom: 8px;
        }
        .label { color: var(--neon); font-weight: 700; font-size: 0.8rem; }
        .val { font-weight: 500; }

        /* الأزرار */
        .cyber-btn {
            background: var(--neon); color: white; border: none;
            padding: 15px 40px; border-radius: 12px; font-family: 'Orbitron';
            text-decoration: none; font-weight: 900; display: inline-block;
            margin-top: 30px; box-shadow: 0 10px 20px rgba(188, 19, 254, 0.3);
            transition: 0.3s;
        }
        .cyber-btn:hover { transform: scale(1.1); box-shadow: 0 15px 30px var(--neon); }

    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div id="cursor-glow"></div>
    <canvas id="matrix-canvas"></canvas>

    <div class="theme-toggle" onclick="toggleTheme()">
        <i id="theme-icon" class="fas fa-moon"></i>
        <span style="font-size: 0.7rem; font-weight: 900; font-family: 'Orbitron';">SWITCH MODE</span>
    </div>

    <section>
        <div class="profile-container">
            <div style="margin-bottom: 20px;">
                <img src="https://img.icons8.com/nolan/128/security-shield.png" style="width: 100px; filter: drop-shadow(0 0 10px var(--neon));">
            </div>
            
            <h1 class="hero-title">DD1_JR</h1>
            <p style="letter-spacing: 5px; opacity: 0.7;">CYBER SECURITY & ARCHITECTURE</p>

            <div class="info-grid">
                <div class="glass-card">
                    <h3 style="margin-bottom: 25px; color: var(--accent);">IDENTIFICATION</h3>
                    <div class="stat-line"><span class="label">USER_ROOT</span><span class="val">Daniel</span></div>
                    <div class="stat-line"><span class="label">ORIGIN</span><span class="val">Iraq 🇮🇶</span></div>
                    <div class="stat-line"><span class="val">Sweden 🇸🇪</span><span class="label">LOCATION</span></div>
                    <div class="stat-line"><span class="label">AGE_NODE</span><span class="val">15</span></div>
                </div>

                <div class="glass-card">
                    <h3 style="margin-bottom: 25px; color: var(--accent);">TECHNICAL_SKILLS</h3>
                    <div class="stat-line"><span class="label">LUA</span><span class="val">EXPERT</span></div>
                    <div class="stat-line"><span class="label">JS/HTML</span><span class="val">ADVANCED</span></div>
                    <div class="stat-line"><span class="label">DEFENSE</span><span class="val">ACTIVE</span></div>
                    <div class="stat-line"><span class="label">STATUS</span><span class="val" style="color: #00ff00;">ONLINE</span></div>
                </div>
            </div>

            <a href="https://top.gg/bot/1488965929810526308" target="_blank" class="cyber-btn">
                <i class="fas fa-robot"></i> SENTINEL BOT
            </a>
        </div>
    </section>

    <script>
        // [1] محرك الماتريكس
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        const letters = "0101010101010101DD1JR";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = document.documentElement.getAttribute('data-theme') === 'dark' ? "rgba(5, 5, 8, 0.1)" : "rgba(245, 245, 247, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = document.documentElement.getAttribute('data-theme') === 'dark' ? "#bc13fe" : "#8b00ff";
            ctx.font = fontSize + "px monospace";
            
            drops.forEach((y, i) => {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 50);

        // [2] التحكم بالثيم (Dark/Light)
        function toggleTheme() {
            const root = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (root.getAttribute('data-theme') === 'dark') {
                root.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-sun';
            } else {
                root.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-moon';
            }
        }

        // [3] تتبع الماوس المخصص
        const cursor = document.getElementById('custom-cursor');
        const glow = document.getElementById('cursor-glow');

        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // تأثير تفاعلي عند الضغط
        window.addEventListener('mousedown', () => cursor.style.transform = 'scale(0.5)');
        window.addEventListener('mouseup', () => cursor.style.transform = 'scale(1)');

        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };

    </script>
</body>
</html>
