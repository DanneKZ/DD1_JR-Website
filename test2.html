<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DD1_JR | STEALTH_OPERATIONS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #bc13fe;
            --cyber-blue: #00d2ff;
            --dark-void: #050508;
            --card-bg: rgba(10, 10, 15, 0.95);
            --soft-glow: rgba(188, 19, 254, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background-color: var(--dark-void);
            color: #b0b0b0; /* لون نص مريح للعين */
            font-family: 'JetBrains Mono', monospace;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* [1] MATRIX ENGINE (خافت وهادئ) */
        #matrix-canvas {
            position: fixed; top: 0; left: 0; z-index: -1;
            opacity: 0.3; /* تقليل السطوع لراحة العين */
            filter: blur(0.5px);
        }

        /* [2] INTRO OVERLAY */
        #intro-overlay {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 1s ease-in-out;
        }
        .intro-text {
            font-family: 'Orbitron', sans-serif; font-size: 4rem; font-weight: 700;
            color: #fff; letter-spacing: 15px; text-shadow: 0 0 15px var(--neon);
        }

        /* [3] UI HUD (خافت ويبرز عند المرور) */
        .ui-controls { position: fixed; top: 20px; left: 25px; display: flex; gap: 15px; z-index: 2000; }
        .ui-controls button {
            background: rgba(15, 15, 20, 0.8); border: 1px solid #222; color: #666;
            padding: 10px 20px; font-family: 'Orbitron'; font-size: 0.6rem;
            transition: 0.3s; letter-spacing: 1px;
        }
        .ui-controls button:hover { border-color: var(--neon); color: var(--neon); background: rgba(188, 19, 254, 0.05); }

        #system-logs {
            position: fixed; bottom: 20px; right: 20px; width: 300px; height: 160px;
            background: rgba(5, 5, 5, 0.9); border: 1px solid #111;
            border-left: 2px solid #333; padding: 15px;
            font-size: 0.7rem; color: #555; backdrop-filter: blur(10px);
            z-index: 1000; transition: 0.3s;
        }
        #system-logs:hover { border-left-color: var(--neon); color: var(--neon); }

        /* [4] CARDS & HOVER EFFECTS (هنا السحر) */
        section { padding: 80px 20px; display: flex; flex-direction: column; align-items: center; }

        .neon-title {
            font-family: 'Orbitron', sans-serif; font-size: clamp(3rem, 10vw, 6rem);
            color: #fff; margin-bottom: 40px; transition: 0.5s;
        }
        .neon-title:hover { text-shadow: 0 0 30px var(--neon); transform: scale(1.02); }

        .identity-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px; width: 100%; max-width: 1100px;
        }

        .cyber-card {
            background: var(--card-bg); border: 1px solid #151515;
            padding: 35px; border-radius: 4px; position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* مؤثرات التمرير الهادئة والقوية في نفس الوقت */
        .cyber-card:hover {
            border-color: var(--neon);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 0 20px var(--soft-glow);
            transform: translateY(-5px);
        }
        .cyber-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 0; height: 2px;
            background: var(--neon); transition: 0.4s;
        }
        .cyber-card:hover::before { width: 100%; }

        .bio-line { margin: 15px 0; font-size: 0.95rem; color: #888; transition: 0.3s; }
        .cyber-card:hover .bio-line { color: #ccc; }
        .bio-key { color: #444; font-weight: bold; font-size: 0.75rem; margin-right: 10px; transition: 0.3s; }
        .cyber-card:hover .bio-key { color: var(--neon); }

        /* Progress Bars */
        .prog-track { background: #111; height: 3px; margin-top: 10px; overflow: hidden; }
        .prog-fill { height: 100%; width: 0; background: #333; transition: 1.5s ease-out; }
        .cyber-card:hover .prog-fill { background: var(--cyber-blue); box-shadow: 0 0 10px var(--cyber-blue); }

        footer { padding: 40px; color: #222; font-size: 0.6rem; letter-spacing: 5px; text-align: center; }

    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div id="intro-overlay">
        <div class="intro-text">DD1_JR</div>
        <div style="width: 200px; height: 1px; background: #222; margin-top: 20px;">
            <div id="bar" style="height: 100%; width: 0; background: var(--neon);"></div>
        </div>
    </div>

    <div class="ui-controls">
        <button onclick="toggleMatrix()">MATRIX_STREAM</button>
        <button onclick="toggleLogs()">TELEMETRY</button>
    </div>

    <div id="system-logs"></div>

    <section>
        <div class="logo-area" style="opacity: 0.5; transition: 0.5s;">
            <svg viewBox="0 0 100 100" style="width: 100px;">
                <circle cx="50" cy="50" r="45" stroke="#333" stroke-width="1" fill="none" />
                <text x="50%" y="55%" text-anchor="middle" fill="#555" font-family="Orbitron" font-size="30">D</text>
            </svg>
        </div>
        <style>.logo-area:hover { opacity: 1; transform: rotate(90deg); }</style>

        <h1 class="neon-title">DD1_JR</h1>

        <div class="identity-grid">
            <div class="cyber-card">
                <div style="color: #444; font-size: 0.7rem; margin-bottom: 20px;">[ IDENTITY_FILE ]</div>
                <div class="bio-line"><span class="bio-key">NAME:</span> Daniel</div>
                <div class="bio-line"><span class="bio-key">AGE:</span> 15 Years</div>
                <div class="bio-line"><span class="bio-key">ROOT:</span> Iraqi 🇮🇶</div>
                <div class="bio-line"><span class="bio-key">LOC:</span> Sweden 🇸🇪</div>
            </div>

            <div class="cyber-card">
                <div style="color: #444; font-size: 0.7rem; margin-bottom: 20px;">[ TECH_STACK ]</div>
                <div class="bio-line">
                    <span class="bio-key">LUA_ENG:</span> 90%
                    <div class="prog-track"><div class="prog-fill" style="width: 90%;"></div></div>
                </div>
                <div class="bio-line">
                    <span class="bio-key">WEB_DEV:</span> 75%
                    <div class="prog-track"><div class="prog-fill" style="width: 75%;"></div></div>
                </div>
                <div class="bio-line">
                    <span class="bio-key">CYBER_SEC:</span> 85%
                    <div class="prog-track"><div class="prog-fill" style="width: 85%;"></div></div>
                </div>
            </div>
        </div>

        <div class="cyber-card" style="margin-top: 30px; width: 100%; max-width: 1100px; display: flex; align-items: center; justify-content: space-between;">
            <div>
                <h4 style="color: #666; font-family: 'Orbitron';">SENTINEL_PROTOCOL</h4>
                <p style="color: #444; font-size: 0.8rem;">Advanced security link validator.</p>
            </div>
            <a href="https://top.gg/bot/1488965929810526308" target="_blank" style="border: 1px solid #333; color: #666; padding: 10px 25px; text-decoration: none; font-size: 0.7rem; transition: 0.3s;">EXECUTE</a>
        </div>
        <style>.cyber-card a:hover { border-color: var(--cyber-blue); color: var(--cyber-blue); box-shadow: 0 0 15px rgba(0, 210, 255, 0.2); }</style>
    </section>

    <footer>// SECURE_TERMINAL // 2026 //</footer>

    <script>
        // [1] MATRIX (STEALTH MODE)
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        const letters = "0123456789ABCDEF";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(5, 5, 8, 0.1)"; /* خلفية داكنة جداً لتقليل الوهج */
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#1a1a1a"; /* لون الحروف الأساسي خافت جداً */
            ctx.font = fontSize + "px monospace";
            
            drops.forEach((y, i) => {
                const text = letters[Math.floor(Math.random() * letters.length)];
                
                // الحرف الذي يسقط يكون لونه بنفسجي باهت وليس ساطعاً
                if (Math.random() > 0.95) ctx.fillStyle = "#4a007d";
                else ctx.fillStyle = "#111";
                
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 60); /* إبطاء الحركة لراحة العين */

        // [2] INTRO
        let prg = 0;
        const loader = setInterval(() => {
            prg += 5;
            document.getElementById('bar').style.width = prg + "%";
            if (prg >= 100) {
                clearInterval(loader);
                setTimeout(() => {
                    document.getElementById('intro-overlay').style.opacity = "0";
                    setTimeout(() => document.getElementById('intro-overlay').style.display = "none", 1000);
                }, 200);
            }
        }, 50);

        // [3] LOGS
        const logsBox = document.getElementById('system-logs');
        function pushLog(msg) {
            const div = document.createElement('div');
            div.innerHTML = `> ${msg}`;
            div.style.marginBottom = "5px";
            logsBox.appendChild(div);
            if (logsBox.childNodes.length > 6) logsBox.firstChild.remove();
        }

        setInterval(() => pushLog("NODE_STABLE_" + Math.floor(Math.random()*900)), 4000);

        function toggleMatrix() { canvas.style.opacity = canvas.style.opacity === "0" ? "0.3" : "0"; }
        function toggleLogs() { logsBox.style.opacity = logsBox.style.opacity === "0" ? "1" : "0"; }

    </script>
</body>
</html>
